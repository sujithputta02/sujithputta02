<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 340" width="100%">
  <defs>
    <style>
      @font-face {
      font-family: 'Press Start 2P';
      src: url(data:font/woff2;charset=utf-8;base64,) format('woff2');
      font-weight: normal;
      font-style: normal;
    }
      
      .bg-rect { fill: #000000; stroke: #fc9838; stroke-width: 4; }
      
      .text-title {
        font-family: 'Press Start 2P', monospace;
        font-size: 16px;
        fill: #fc9838;
        text-shadow: 2px 2px #000;
        animation: textGlow 1s infinite alternate;
      }
      .text-label {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #ffffff;
      }
      .text-val {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #39ff14;
      }
      .hud-line { stroke: #ffffff; stroke-width: 2; stroke-dasharray: 4 4; }
      
      .box-container {
        fill: #141414;
        stroke: #b83c18;
        stroke-width: 2;
      }
      
      .block-icon { animation: bounceItem 2s infinite ease-in-out; }
      .block-icon-delay1 { animation: bounceItem 2s infinite ease-in-out 0.5s; }
      .block-icon-delay2 { animation: bounceItem 2s infinite ease-in-out 1s; }
      .block-icon-delay3 { animation: bounceItem 2s infinite ease-in-out 1.5s; }

      @keyframes textGlow {
        0% { fill: #fc9838; }
        100% { fill: #ffcca0; }
      }

      @keyframes bounceItem {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
    </style>
  </defs>

  <!-- Status Window Base -->
  <rect x="5" y="5" width="840" height="330" rx="8" class="bg-rect"/>

  <!-- Screen Header -->
  <text x="425" y="38" class="text-title" text-anchor="middle">👾 SUJITH'S SYSTEM STATS SELECT 👾</text>
  <line x1="40" y1="55" x2="810" y2="55" class="hud-line"/>

  <!-- PANEL 1: PUBLIC STATS -->
  <g transform="translate(40, 80)">
    <rect width="360" height="220" rx="6" class="box-container"/>
    <text x="20" y="30" font-family="'Press Start 2P', monospace" font-size="11" fill="#fc9838">> HERO METRICS</text>
    
    <!-- Stat Item: Total Commits (represented as Goombas stomped!) -->
    <g transform="translate(20, 60)" class="block-icon">
      <!-- Goomba Icon -->
      <path d="M3 8 C3 2, 13 2, 13 8 Z" fill="#a85400"/>
      <rect x="5" y="8" width="6" height="3" fill="#fce4a0"/>
    </g>
    <text x="45" y="70" class="text-label">COMMITS STOMPED:</text>
    <text x="245" y="70" class="text-val" id="val-commits">638</text>

    <!-- Stat Item: Stars Received (represented as Gold Coins) -->
    <g transform="translate(20, 100)" class="block-icon-delay1">
      <ellipse cx="8" cy="8" rx="4" ry="7" fill="#fcf800"/>
    </g>
    <text x="45" y="110" class="text-label">COINS COLLECTED:</text>
    <text x="245" y="110" class="text-val" id="val-stars">6</text>

    <!-- Stat Item: Public Repos (represented as pipes cleared!) -->
    <g transform="translate(20, 140)" class="block-icon-delay2">
      <rect x="3" y="1" width="10" height="13" fill="#00a800"/>
    </g>
    <text x="45" y="150" class="text-label">LEVELS CLEARED:</text>
    <text x="245" y="150" class="text-val" id="val-repos">31</text>

    <!-- Stat Item: Followers (represented as Toad companions!) -->
    <g transform="translate(20, 180)" class="block-icon-delay3">
      <!-- Toad mushroom cap -->
      <circle cx="8" cy="6" r="6" fill="#ff0000"/>
      <circle cx="8" cy="11" r="4" fill="#ffcca0"/>
    </g>
    <text x="45" y="190" class="text-label">TOAD ALLIES:</text>
    <text x="245" y="190" class="text-val" id="val-followers">10</text>
  </g>

  <!-- PANEL 2: ADVENTURE SKILLS -->
  <g transform="translate(450, 80)">
    <rect width="360" height="220" rx="6" class="box-container"/>
    <text x="20" y="30" font-family="'Press Start 2P', monospace" font-size="11" fill="#fc9838">> POWER-UPS</text>
    
    <!-- Skill: Python (Fire Flower) -->
    <g transform="translate(20, 55)" class="block-icon">
      <circle cx="8" cy="8" r="6" fill="#ff3000"/>
      <circle cx="8" cy="8" r="3" fill="#fc9838"/>
    </g>
    <text x="45" y="65" class="text-label">FIRE PYTHON:</text>
    <text x="245" y="65" class="text-val">LV. 99 (MAX)</text>

    <!-- Skill: TypeScript (Super Feather) -->
    <g transform="translate(20, 95)" class="block-icon-delay1">
      <path d="M 2 14 L 14 2 L 10 14 Z" fill="#00f0ff"/>
    </g>
    <text x="45" y="105" class="text-label">CAPE TYPESCRIPT:</text>
    <text x="245" y="105" class="text-val">LV. 95</text>

    <!-- Skill: Next.js (Yoshi Saddle) -->
    <g transform="translate(20, 135)" class="block-icon-delay2">
      <circle cx="8" cy="8" r="6" fill="#00a800"/>
    </g>
    <text x="45" y="145" class="text-label">YOSHI NEXT.JS:</text>
    <text x="245" y="145" class="text-val">LV. 90</text>

    <!-- Skill: RAG / AI (Super Star) -->
    <g transform="translate(20, 175)" class="block-icon-delay3">
      <!-- Star shape -->
      <polygon points="8,1 10,6 15,6 11,10 13,15 8,12 3,15 5,10 1,6 6,6" fill="#fcf800"/>
    </g>
    <text x="45" y="185" class="text-label">STAR AI &amp; RAG:</text>
    <text x="245" y="185" class="text-val">LV. 90</text>
  </g>

  <!-- Bottom Message Bar -->
  <rect x="40" y="308" width="770" height="18" fill="#141414" stroke="#ffffff" stroke-width="1"/>
  <text x="50" y="321" font-family="'Press Start 2P', monospace" font-size="7" fill="#ffffff">PRESS START TO INITIATE CO-OP MISSION WITH SUJITH_</text>
  <text x="800" y="321" font-family="'Press Start 2P', monospace" font-size="7" fill="#fcf800" text-anchor="end">STAGE 1-1 READY</text>
</svg>
