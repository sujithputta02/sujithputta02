<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 340" width="100%">
  <defs>
    <style>
      @font-face {
      font-family: 'Press Start 2P';
      src: url(data:font/woff2;charset=utf-8;base64,) format('woff2');
      font-weight: normal;
      font-style: normal;
      }
      
      .bg-sky { fill: #5c94fc; }
      
      .cloud { fill: #ffffff; }
      
      .text-title {
        font-family: 'Press Start 2P', monospace;
        font-size: 14px;
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 2.5;
        paint-order: stroke fill;
      }
      .text-panel-header {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #b83c18;
        font-weight: bold;
      }
      .text-label {
        font-family: 'Press Start 2P', monospace;
        font-size: 9px;
        fill: #4a3728;
      }
      .text-val {
        font-family: 'Press Start 2P', monospace;
        font-size: 9px;
        fill: #00a800;
        font-weight: bold;
      }
      .hud-line { stroke: #ffffff; stroke-width: 2; stroke-dasharray: 4 4; }
      
      /* Dialogue Style Panel Containers */
      .box-container {
        fill: #fce4a0;
        stroke: #000000;
        stroke-width: 3;
      }
      
      .box-inner {
        fill: none;
        stroke: #b83c18;
        stroke-width: 1.5;
      }
      
      /* Icons animation */
      .block-icon { animation: bounceItem 2s infinite ease-in-out; }
      .block-icon-delay1 { animation: bounceItem 2s infinite ease-in-out 0.5s; }
      .block-icon-delay2 { animation: bounceItem 2s infinite ease-in-out 1s; }
      .block-icon-delay3 { animation: bounceItem 2s infinite ease-in-out 1.5s; }

      @keyframes bounceItem {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      
      /* Ground blocks at the bottom */
      .ground-top { fill: #fc9838; }
      .ground-side { fill: #b83c18; }
      
      .cloud-bg-1 { animation: cloudDrift 60s infinite linear; }
      .cloud-bg-2 { animation: cloudDrift 90s infinite linear -30s; }

      @keyframes cloudDrift {
        0% { transform: translateX(850px); }
        100% { transform: translateX(-200px); }
      }
    </style>
  </defs>

  <!-- Sky Background -->
  <rect width="850" height="340" class="bg-sky"/>

  <!-- Clouds -->
  <g class="cloud-bg-1" transform="translate(100, 10)">
    <path d="M120,20 C110,20 100,28 100,38 C90,38 80,46 80,56 C80,66 90,74 100,74 L160,74 C170,74 180,66 180,56 C180,46 170,38 160,38 C160,28 150,20 140,20 Z" class="cloud" opacity="0.6"/>
  </g>
  <g class="cloud-bg-2" transform="translate(500, 20)">
    <path d="M60,10 C55,10 50,14 50,19 C45,19 40,23 40,28 C40,33 45,37 50,37 L80,37 C85,37 90,33 90,28 C90,23 85,19 80,19 C80,14 75,10 70,10 Z" class="cloud" opacity="0.5"/>
  </g>

  <!-- Screen Header -->
  <text x="425" y="32" class="text-title" text-anchor="middle">> HERO METRICS &amp; POWER-UPS &lt;</text>

  <!-- PANEL 1: PUBLIC METRICS (Dialogue Styled) -->
  <g transform="translate(40, 55)">
    <!-- Box Base -->
    <rect width="360" height="220" rx="8" class="box-container"/>
    <rect x="6" y="6" width="348" height="208" rx="5" class="box-inner"/>
    <text x="20" y="32" class="text-panel-header">> HERO METRICS</text>
    
    <!-- Stat Item: Commits (Minion/Goomba Stomped) -->
    <g transform="translate(20, 52)" class="block-icon">
      <path d="M3 8 C3 2, 13 2, 13 8 Z" fill="#a85400"/>
      <rect x="5" y="8" width="6" height="3" fill="#fce4a0"/>
    </g>
    <text x="45" y="62" class="text-label">COMMITS STOMPED:</text>
    <text x="235" y="62" class="text-val" id="val-commits">646</text>

    <!-- Stat Item: Stars (Gold Coins) -->
    <g transform="translate(20, 92)" class="block-icon-delay1">
      <ellipse cx="8" cy="8" rx="4" ry="7" fill="#fcf800" stroke="#000" stroke-width="1"/>
      <line x1="8" y1="4" x2="8" y2="12" stroke="#fc9838" stroke-width="1"/>
    </g>
    <text x="45" y="102" class="text-label">COINS COLLECTED:</text>
    <text x="235" y="102" class="text-val" id="val-stars">6</text>

    <!-- Stat Item: Repos (Green Pipe/Flag) -->
    <g transform="translate(20, 132)" class="block-icon-delay2">
      <rect x="3" y="1" width="10" height="13" fill="#00a800" stroke="#000" stroke-width="1"/>
    </g>
    <text x="45" y="142" class="text-label">LEVELS CLEARED:</text>
    <text x="235" y="142" class="text-val" id="val-repos">31</text>

    <!-- Stat Item: Followers (Toad/NPC icon) -->
    <g transform="translate(20, 172)" class="block-icon-delay3">
      <circle cx="8" cy="6" r="6" fill="#ff0000" stroke="#000" stroke-width="1"/>
      <circle cx="8" cy="11" r="4" fill="#ffcca0" stroke="#000" stroke-width="1"/>
    </g>
    <text x="45" y="182" class="text-label">NPC ALLIES:</text>
    <text x="235" y="182" class="text-val" id="val-followers">9</text>
  </g>

  <!-- PANEL 2: ADVENTURE SKILLS / POWER-UPS -->
  <g transform="translate(450, 55)">
    <!-- Box Base -->
    <rect width="360" height="220" rx="8" class="box-container"/>
    <rect x="6" y="6" width="348" height="208" rx="5" class="box-inner"/>
    <text x="20" y="32" class="text-panel-header">> POWER-UPS</text>
    
    <!-- Skill: Python (Fire Flower) -->
    <g transform="translate(20, 48)" class="block-icon">
      <circle cx="8" cy="8" r="6" fill="#ff3000" stroke="#000" stroke-width="1"/>
      <circle cx="8" cy="8" r="3" fill="#fc9838"/>
    </g>
    <text x="45" y="58" class="text-label">FIRE PYTHON:</text>
    <text x="235" y="58" class="text-val">LV. 99 (MAX)</text>

    <!-- Skill: TypeScript (Super Feather) -->
    <g transform="translate(20, 88)" class="block-icon-delay1">
      <path d="M 2 14 L 14 2 L 10 14 Z" fill="#00f0ff" stroke="#000" stroke-width="1"/>
    </g>
    <text x="45" y="98" class="text-label">CAPE TYPESCRIPT:</text>
    <text x="235" y="98" class="text-val">LV. 95</text>

    <!-- Skill: Next.js (Green Mount) -->
    <g transform="translate(20, 128)" class="block-icon-delay2">
      <circle cx="8" cy="8" r="6" fill="#00a800" stroke="#000" stroke-width="1"/>
    </g>
    <text x="45" y="138" class="text-label">MOUNT NEXT.JS:</text>
    <text x="235" y="138" class="text-val">LV. 90</text>

    <!-- Skill: RAG / AI (Super Star) -->
    <g transform="translate(20, 168)" class="block-icon-delay3">
      <polygon points="8,1 10,6 15,6 11,10 13,15 8,12 3,15 5,10 1,6 6,6" fill="#fcf800" stroke="#000" stroke-width="1"/>
    </g>
    <text x="45" y="178" class="text-label">STAR AI &amp; RAG:</text>
    <text x="235" y="178" class="text-val">LV. 90</text>
  </g>

  <!-- Bottom Terrain blocks -->
  <g transform="translate(0, 315)">
    <rect width="850" height="5" class="ground-top"/>
    <rect y="5" width="850" height="20" class="ground-side"/>
    <!-- Grid overlay -->
    <path d="M 0 5 L 850 5 M 0 12 L 850 12" stroke="#000" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M 20 0 v 25 M 40 0 v 25 M 60 0 v 25 M 80 0 v 25 M 100 0 v 25 M 120 0 v 25 M 140 0 v 25 M 160 0 v 25 M 180 0 v 25 M 200 0 v 25 M 220 0 v 25 M 240 0 v 25 M 260 0 v 25 M 280 0 v 25 M 300 0 v 25 M 320 0 v 25 M 340 0 v 25 M 360 0 v 25 M 380 0 v 25 M 400 0 v 25 M 420 0 v 25 M 440 0 v 25 M 460 0 v 25 M 480 0 v 25 M 500 0 v 25 M 520 0 v 25 M 540 0 v 25 M 560 0 v 25 M 580 0 v 25 M 600 0 v 25 M 620 0 v 25 M 640 0 v 25 M 660 0 v 25 M 680 0 v 25 M 700 0 v 25 M 720 0 v 25 M 740 0 v 25 M 760 0 v 25 M 780 0 v 25 M 800 0 v 25 M 820 0 v 25 M 840 0 v 25" stroke="#000" stroke-width="1" stroke-opacity="0.3"/>
  </g>
</svg>
