<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 360" width="100%">
  <defs>
    <style>
      @font-face {
      font-family: 'Press Start 2P';
      src: url(data:font/woff2;charset=utf-8;base64,) format('woff2');
      font-weight: normal;
      font-style: normal;
      }
      
      .bg-sky { fill: #5c94fc; }
      
      .cloud { fill: #ffffff; }
      
      .dialogue-box {
        fill: #fce4a0;
        stroke: #000000;
        stroke-width: 4;
      }
      
      .dialogue-inner {
        fill: none;
        stroke: #b83c18;
        stroke-width: 2;
      }
      
      .text-prompt {
        font-family: 'Press Start 2P', monospace;
        font-size: 8px;
        fill: #b83c18;
      }
      
      .text-label {
        font-family: 'Press Start 2P', monospace;
        font-size: 8px;
        fill: #b83c18;
        font-weight: bold;
      }
      
      .text-val {
        font-family: 'Press Start 2P', monospace;
        font-size: 8px;
        fill: #000000;
      }
      
      .text-val-green {
        font-family: 'Press Start 2P', monospace;
        font-size: 8px;
        fill: #00a800;
      }
      
      /* Ground blocks at the bottom */
      .ground-top { fill: #fc9838; }
      .ground-side { fill: #b83c18; }
      
      /* NES Controller Graphics */
      .ctrl-body { fill: #cccccc; stroke: #000000; stroke-width: 2; }
      .ctrl-dark-rect { fill: #3e3e3e; }
      .ctrl-button-red { fill: #e52521; stroke: #000000; stroke-width: 1.5; }
      .ctrl-dpad { fill: #000000; }
      .ctrl-label { font-family: 'Press Start 2P', monospace; font-size: 5px; fill: #e52521; }
      .ctrl-action-pill { fill: #3e3e3e; }
      
      .cloud-bg-1 { animation: cloudDrift 50s infinite linear; }
      .cloud-bg-2 { animation: cloudDrift 80s infinite linear -20s; }
      
      @keyframes cloudDrift {
        0% { transform: translateX(850px); }
        100% { transform: translateX(-200px); }
      }
    </style>
  </defs>

  <!-- Sky Background -->
  <rect width="850" height="360" class="bg-sky"/>

  <!-- Clouds Background -->
  <g class="cloud-bg-1" transform="translate(100, 10)">
    <path d="M120,20 C110,20 100,28 100,38 C90,38 80,46 80,56 C80,66 90,74 100,74 L160,74 C170,74 180,66 180,56 C180,46 170,38 160,38 C160,28 150,20 140,20 Z" class="cloud" opacity="0.6"/>
  </g>
  <g class="cloud-bg-2" transform="translate(450, 20)">
    <path d="M60,10 C55,10 50,14 50,19 C45,19 40,23 40,28 C40,33 45,37 50,37 L80,37 C85,37 90,33 90,28 C90,23 85,19 80,19 C80,14 75,10 70,10 Z" class="cloud" opacity="0.5"/>
  </g>

  <!-- Main Dialogue Box (Dialogue screen styled) -->
  <rect x="35" y="30" width="780" height="275" rx="12" class="dialogue-box"/>
  <rect x="42" y="37" width="766" height="261" rx="8" class="dialogue-inner"/>

  <!-- LEFT: NES Controller Illustration -->
  <g transform="translate(65, 125)">
    <!-- Controller outline -->
    <rect width="130" height="70" rx="8" class="ctrl-body"/>
    <!-- Dark central panel -->
    <rect x="10" y="10" width="110" height="50" rx="4" class="ctrl-dark-rect"/>
    <!-- Red buttons A and B -->
    <circle cx="90" cy="38" r="8" class="ctrl-button-red"/>
    <text x="90" y="55" class="ctrl-label" text-anchor="middle">B</text>
    <circle cx="110" cy="38" r="8" class="ctrl-button-red"/>
    <text x="110" y="55" class="ctrl-label" text-anchor="middle">A</text>
    <!-- D-Pad -->
    <path d="M 22 28 h 10 v 10 h -10 z" class="ctrl-dpad"/>
    <path d="M 27 23 h 10 v 10 h -10 z" class="ctrl-dpad"/>
    <path d="M 32 28 h 10 v 10 h -10 z" class="ctrl-dpad"/>
    <path d="M 27 33 h 10 v 10 h -10 z" class="ctrl-dpad"/>
    <circle cx="32" cy="33" r="2" fill="#3e3e3e"/>
    <!-- Select / Start button pills -->
    <rect x="52" y="35" width="12" height="4" rx="2" class="ctrl-action-pill"/>
    <rect x="68" y="35" width="12" height="4" rx="2" class="ctrl-action-pill"/>
    <text x="58" y="46" font-family="'Press Start 2P'" font-size="4" fill="#ffffff" text-anchor="middle">SELECT</text>
    <text x="74" y="46" font-family="'Press Start 2P'" font-size="4" fill="#ffffff" text-anchor="middle">START</text>
  </g>

  <!-- RIGHT: Terminal neofetch output -->
  <g transform="translate(230, 50)">
    <!-- Command Prompt -->
    <text x="10" y="15" class="text-prompt">sujithputta02@terminal:~$ ./retro_boot.sh --status</text>
    
    <!-- Stats lines -->
    <g transform="translate(10, 42)">
      <!-- Line 1: OS -->
      <text x="0" y="0" class="text-label">OS:<tspan class="text-val"> NES / Pixel Kingdom OS</tspan></text>
      <!-- Line 2: Host -->
      <text x="0" y="20" class="text-label">Host:<tspan class="text-val"> Developer &amp; AI Specialist</tspan></text>
      <!-- Line 3: Kernel -->
      <text x="0" y="40" class="text-label">Kernel:<tspan class="text-val"> Retro Game Engine v1.1</tspan></text>
      <!-- Line 4: Uptime -->
      <text x="0" y="60" class="text-label">Uptime:<tspan class="text-val"> Level 1-1 Cleared 🌟</tspan></text>
      <!-- Line 5: Shell -->
      <text x="0" y="80" class="text-label">Shell:<tspan class="text-val"> zsh / TypeScript / Python</tspan></text>
      <!-- Line 6: Resolution -->
      <text x="0" y="100" class="text-label">Resolution:<tspan class="text-val"> 8-bit Pixel Art</tspan></text>
      <!-- Line 7: Editor -->
      <text x="0" y="120" class="text-label">Editor:<tspan class="text-val"> VS Code / Cursor / Retro Paint</tspan></text>
      <!-- Line 8: CPU -->
      <text x="0" y="140" class="text-label">CPU:<tspan class="text-val"> NES Ricoh 2A03 (Neural Net-powered)</tspan></text>
      <!-- Line 9: Memory -->
      <text x="0" y="160" class="text-label">Memory:<tspan class="text-val"> 2KB Work RAM (Optimized for RAG)</tspan></text>
      <!-- Line 10: Mission -->
      <text x="0" y="180" class="text-label">Mission:<tspan class="text-val-green"> Defeating bugs &amp; carbon footprints</tspan></text>
    </g>
  </g>

  <!-- Ground Terrain decoration at the bottom -->
  <g transform="translate(0, 330)">
    <rect width="850" height="6" class="ground-top"/>
    <rect y="6" width="850" height="24" class="ground-side"/>
    <!-- Grid pattern overlay for standard Mario ground texture block feel -->
    <path d="M 0 6 L 850 6 M 0 14 L 850 14 M 0 22 L 850 22" stroke="#000" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M 20 0 v 30 M 40 0 v 30 M 60 0 v 30 M 80 0 v 30 M 100 0 v 30 M 120 0 v 30 M 140 0 v 30 M 160 0 v 30 M 180 0 v 30 M 200 0 v 30 M 220 0 v 30 M 240 0 v 30 M 260 0 v 30 M 280 0 v 30 M 300 0 v 30 M 320 0 v 30 M 340 0 v 30 M 360 0 v 30 M 380 0 v 30 M 400 0 v 30 M 420 0 v 30 M 440 0 v 30 M 460 0 v 30 M 480 0 v 30 M 500 0 v 30 M 520 0 v 30 M 540 0 v 30 M 560 0 v 30 M 580 0 v 30 M 600 0 v 30 M 620 0 v 30 M 640 0 v 30 M 660 0 v 30 M 680 0 v 30 M 700 0 v 30 M 720 0 v 30 M 740 0 v 30 M 760 0 v 30 M 780 0 v 30 M 800 0 v 30 M 820 0 v 30 M 840 0 v 30" stroke="#000" stroke-width="1" stroke-opacity="0.3"/>
  </g>
</svg>
