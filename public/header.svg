<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%">
  <defs>
    <style>
      @font-face {
      font-family: 'Press Start 2P';
      src: url(data:font/woff2;charset=utf-8;base64,) format('woff2');
      font-weight: normal;
      font-style: normal;
    }
      
      .bg-sky { fill: #5c94fc; }
      
      /* Retro Text HUD */
      .hud-label {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #ffffff;
      }
      .hud-value {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #ffffff;
      }
      
      /* Ground block pattern */
      .ground-top { fill: #fc9838; }
      .ground-side { fill: #b83c18; }
      .ground-shadow { fill: #000000; opacity: 0.3; }
      
      /* Clouds and Bushes */
      .cloud { fill: #ffffff; }
      .bush-dark { fill: #008000; }
      .bush-light { fill: #00a800; }
      
      /* Bricks and Question Blocks */
      .brick-base { fill: #b83c18; stroke: #000000; stroke-width: 1.5; }
      .brick-line { fill: none; stroke: #000000; stroke-width: 1.5; }
      
      .q-block { fill: #fc9838; stroke: #000000; stroke-width: 1.5; animation: qBlockPulse 1s infinite steps(4); }
      .q-text { font-family: 'Press Start 2P', monospace; font-size: 12px; fill: #ffffff; font-weight: bold; }
      
      /* Title text in colorful retro logo style */
      .title-text {
        font-family: 'Press Start 2P', monospace;
        font-size: 30px;
      }
      
      .letter-bounce {
        display: inline-block;
        animation: letterBob 2s infinite ease-in-out;
      }
      
      .subtitle-text {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #ffffff;
        letter-spacing: 1px;
      }
      
      /* Characters */
      .hero-character {
        animation: heroRunAndJump 10s infinite linear;
      }
      .minion-character {
        animation: minionWalk 10s infinite linear;
      }
      .coin-item {
        animation: coinPop 10s infinite linear;
      }
      
      /* Cloud scrolling */
      .cloud-bg-1 { animation: cloudDrift 60s infinite linear; }
      .cloud-bg-2 { animation: cloudDrift 90s infinite linear -30s; }

      /* Keyframe Animations */
      @keyframes qBlockPulse {
        0%, 100% { fill: #fc9838; }
        50% { fill: #e45c10; }
      }
      
      @keyframes cloudDrift {
        0% { transform: translateX(850px); }
        100% { transform: translateX(-200px); }
      }

      @keyframes letterBob {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      @keyframes heroRunAndJump {
        /* Spawn and run left-to-right */
        0% { transform: translate(-40px, 192px) scaleX(1); }
        28% { transform: translate(320px, 192px) scaleX(1); }
        /* Jump to hit the first question block */
        31% { transform: translate(380px, 130px) scaleX(1); }
        34% { transform: translate(430px, 192px) scaleX(1); }
        /* Run towards Minion */
        46% { transform: translate(550px, 192px) scaleX(1); }
        /* Jump over Minion */
        49% { transform: translate(610px, 110px) scaleX(1); }
        52% { transform: translate(670px, 192px) scaleX(1); }
        /* Run off screen right */
        60% { transform: translate(900px, 192px) scaleX(1); }
        61% { transform: translate(900px, 192px) scaleX(-1); }
        /* Run back right-to-left */
        62% { transform: translate(850px, 192px) scaleX(-1); }
        98% { transform: translate(-40px, 192px) scaleX(-1); }
        100% { transform: translate(-40px, 192px) scaleX(1); }
      }

      @keyframes minionWalk {
        0% { transform: translate(880px, 200px) scaleX(1); }
        30% { transform: translate(580px, 200px) scaleX(1); }
        /* Hero jumps over Minion here */
        60% { transform: translate(280px, 200px) scaleX(1); }
        90% { transform: translate(-50px, 200px) scaleX(1); }
        91% { transform: translate(-50px, 200px) scaleX(-1); }
        100% { transform: translate(880px, 200px) scaleX(-1); }
      }

      @keyframes coinPop {
        0%, 30.5% { transform: translate(394px, 140px); opacity: 0; }
        31% { transform: translate(394px, 80px); opacity: 1; }
        33%, 100% { transform: translate(394px, 140px); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Sky Background -->
  <rect width="850" height="280" class="bg-sky"/>

  <!-- Clouds -->
  <g class="cloud-bg-1" transform="translate(100, 40)">
    <path d="M120,20 C110,20 100,28 100,38 C90,38 80,46 80,56 C80,66 90,74 100,74 L160,74 C170,74 180,66 180,56 C180,46 170,38 160,38 C160,28 150,20 140,20 Z" class="cloud" opacity="0.8"/>
  </g>
  <g class="cloud-bg-2" transform="translate(500, 60)">
    <path d="M60,10 C55,10 50,14 50,19 C45,19 40,23 40,28 C40,33 45,37 50,37 L80,37 C85,37 90,33 90,28 C90,23 85,19 80,19 C80,14 75,10 70,10 Z" class="cloud" opacity="0.6"/>
  </g>

  <!-- HUD Stats Selection -->
  <text x="50" y="30" class="hud-label">SUJITH</text>
  <text x="50" y="45" class="hud-value">000676</text>

  <text x="280" y="30" class="hud-label">COINS</text>
  <text x="280" y="45" class="hud-value">x08</text>

  <text x="510" y="30" class="hud-label">WORLD</text>
  <text x="510" y="45" class="hud-value">1-1</text>

  <text x="730" y="30" class="hud-label">TIME</text>
  <text x="730" y="45" class="hud-value">2026</text>

  <!-- Main Colorful Animated Retro-style Title -->
  <text x="425" y="102" class="title-text" text-anchor="middle" stroke="#000000" stroke-width="4" paint-order="stroke fill" font-weight="bold">
    <tspan class="letter-bounce" fill="#e52521">S</tspan>
    <tspan class="letter-bounce" fill="#f2a900" style="animation-delay: 0.1s">U</tspan>
    <tspan class="letter-bounce" fill="#002fbe" style="animation-delay: 0.2s">J</tspan>
    <tspan class="letter-bounce" fill="#43b047" style="animation-delay: 0.3s">I</tspan>
    <tspan class="letter-bounce" fill="#e52521" style="animation-delay: 0.4s">T</tspan>
    <tspan class="letter-bounce" fill="#f2a900" style="animation-delay: 0.5s">H</tspan>
    <tspan class="letter-bounce"> </tspan>
    <tspan class="letter-bounce" fill="#002fbe" style="animation-delay: 0.6s">P</tspan>
    <tspan class="letter-bounce" fill="#43b047" style="animation-delay: 0.7s">U</tspan>
    <tspan class="letter-bounce" fill="#e52521" style="animation-delay: 0.8s">T</tspan>
    <tspan class="letter-bounce" fill="#f2a900" style="animation-delay: 0.9s">T</tspan>
    <tspan class="letter-bounce" fill="#002fbe" style="animation-delay: 1.0s">A</tspan>
  </text>
  
  <text x="425" y="125" class="subtitle-text" text-anchor="middle" stroke="#000000" stroke-width="2.5" paint-order="stroke fill">> FULL-STACK DEVELOPER &amp; AI SPECIALIST &lt;</text>

  <!-- Level Bricks & Pipes -->
  <!-- Green Pipe -->
  <g transform="translate(150, 160)">
    <rect x="0" y="20" width="48" height="60" fill="#00a800" stroke="#000" stroke-width="2"/>
    <rect x="-4" y="0" width="56" height="20" fill="#00f800" stroke="#000" stroke-width="2"/>
    <!-- Highlights -->
    <rect x="6" y="20" width="6" height="60" fill="#00f800"/>
    <rect x="2" y="2" width="6" height="16" fill="#ffffff"/>
  </g>

  <!-- Floating Bricks & Question Block -->
  <!-- Brick 1 -->
  <g transform="translate(350, 130)">
    <rect width="32" height="32" class="brick-base"/>
    <line x1="0" y1="10" x2="32" y2="10" class="brick-line"/>
    <line x1="0" y1="21" x2="32" y2="21" class="brick-line"/>
    <line x1="10" y1="0" x2="10" y2="10" class="brick-line"/>
    <line x1="22" y1="0" x2="22" y2="10" class="brick-line"/>
    <line x1="5" y1="10" x2="5" y2="21" class="brick-line"/>
    <line x1="16" y1="10" x2="16" y2="21" class="brick-line"/>
    <line x1="27" y1="10" x2="27" y2="21" class="brick-line"/>
  </g>
  <!-- Question Block -->
  <g transform="translate(382, 130)" class="q-block-container">
    <rect width="32" height="32" class="q-block"/>
    <text x="16" y="22" class="q-text" text-anchor="middle">?</text>
    <circle cx="5" cy="5" r="1" fill="#000000"/>
    <circle cx="27" cy="5" r="1" fill="#000000"/>
    <circle cx="5" cy="27" r="1" fill="#000000"/>
    <circle cx="27" cy="27" r="1" fill="#000000"/>
  </g>
  <!-- Brick 2 -->
  <g transform="translate(414, 130)">
    <rect width="32" height="32" class="brick-base"/>
    <line x1="0" y1="10" x2="32" y2="10" class="brick-line"/>
    <line x1="0" y1="21" x2="32" y2="21" class="brick-line"/>
    <line x1="10" y1="0" x2="10" y2="10" class="brick-line"/>
    <line x1="22" y1="0" x2="22" y2="10" class="brick-line"/>
    <line x1="5" y1="10" x2="5" y2="21" class="brick-line"/>
    <line x1="16" y1="10" x2="16" y2="21" class="brick-line"/>
    <line x1="27" y1="10" x2="27" y2="21" class="brick-line"/>
  </g>

  <!-- Jumping Coin Item -->
  <g class="coin-item">
    <ellipse cx="10" cy="15" rx="5" ry="10" fill="#fcf800" stroke="#000" stroke-width="1.5"/>
    <line x1="10" y1="9" x2="10" y2="21" stroke="#fc9838" stroke-width="1.5"/>
  </g>

  <!-- Minion Character -->
  <g class="minion-character">
    <path d="M 6 16 C 6 4, 26 4, 26 16 Z" fill="#a85400" stroke="#000" stroke-width="1.5"/>
    <path d="M 10 16 L 22 16 L 22 22 L 10 22 Z" fill="#fce4a0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="9" cy="22" rx="4" ry="3" fill="#000000"/>
    <ellipse cx="23" cy="22" rx="4" ry="3" fill="#000000"/>
    <rect x="12" y="9" width="2" height="5" fill="#000"/>
    <rect x="18" y="9" width="2" height="5" fill="#000"/>
  </g>

  <!-- Hero Character -->
  <g class="hero-character">
    <path d="M 6 0 h 12 v 4 h -12 Z" fill="#ff0000"/>
    <path d="M 4 2 h 18 v 2 h -18 Z" fill="#ff0000"/>
    <path d="M 6 4 h 6 v 2 h -6 Z" fill="#a85400"/>
    <path d="M 12 4 h 6 v 2 h -6 Z" fill="#ffcca0"/>
    <rect x="18" y="4" width="2" height="4" fill="#000000"/>
    <path d="M 6 6 h 2 v 4 h -2 Z" fill="#a85400"/>
    <path d="M 8 6 h 12 v 6 h -12 Z" fill="#ffcca0"/>
    <path d="M 14 10 h 6 v 2 h -6 Z" fill="#a85400"/>
    <path d="M 4 12 h 16 v 10 h -16 Z" fill="#ff0000"/>
    <path d="M 8 12 h 8 v 12 h -8 Z" fill="#0000d8"/>
    <circle cx="10" cy="18" r="1.5" fill="#fcf800"/>
    <circle cx="14" cy="18" r="1.5" fill="#fcf800"/>
    <circle cx="2" cy="17" r="3" fill="#ffcca0" stroke="#000000" stroke-width="1"/>
    <circle cx="22" cy="17" r="3" fill="#ffcca0" stroke="#000000" stroke-width="1"/>
    <rect x="6" y="24" width="5" height="6" fill="#a85400" stroke="#000" stroke-width="1.5"/>
    <rect x="13" y="24" width="5" height="6" fill="#a85400" stroke="#000" stroke-width="1.5"/>
  </g>

  <!-- Ground Terrain -->
  <g transform="translate(0, 240)">
    <path d="M 0 0 h 850 v 8 h -850 Z" class="ground-top"/>
    <path d="M 0 8 h 850 v 32 h -850 Z" class="ground-side"/>
    <path d="M 0 8 L 850 8 M 0 18 L 850 18 M 0 28 L 850 28 M 0 38 L 850 38" stroke="#000" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M 20 8 v 32 M 40 8 v 32 M 60 8 v 32 M 80 8 v 32 M 100 8 v 32 M 120 8 v 32 M 140 8 v 32 M 160 8 v 32 M 180 8 v 32 M 200 8 v 32 M 220 8 v 32 M 240 8 v 32 M 260 8 v 32 M 280 8 v 32 M 300 8 v 32 M 320 8 v 32 M 340 8 v 32 M 360 8 v 32 M 380 8 v 32 M 400 8 v 32 M 420 8 v 32 M 440 8 v 32 M 460 8 v 32 M 480 8 v 32 M 500 8 v 32 M 520 8 v 32 M 540 8 v 32 M 560 8 v 32 M 580 8 v 32 M 600 8 v 32 M 620 8 v 32 M 640 8 v 32 M 660 8 v 32 M 680 8 v 32 M 700 8 v 32 M 720 8 v 32 M 740 8 v 32 M 760 8 v 32 M 780 8 v 32 M 800 8 v 32 M 820 8 v 32 M 840 8 v 32" stroke="#000" stroke-width="1" stroke-opacity="0.4"/>
  </g>
</svg>
